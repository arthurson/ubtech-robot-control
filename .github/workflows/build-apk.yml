name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: 獲取源代碼
      uses: actions/checkout@v4

    - name: 設置 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 緩存 Buildozer 環境
      uses: actions/cache@v4
      id: buildozer-cache
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements_android.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: 安裝系統依賴包
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential git \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev autoconf libtool pkg-config automake \
          libncurses5-dev libncursesw5-dev cmake \
          libopenjp2-7 \
          openjdk-17-jdk zip unzip \
          wget curl
        # Ubuntu 24.04 兼容性處理
        sudo apt-get install -y libtinfo6 libtiff6 || true
        echo "系統依賴安裝完成"

    - name: 安裝 Python 打包工具
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython pillow

    - name: 創建應用圖標
      run: |
        mkdir -p assets
        python3 -c "
        from PIL import Image
        try:
            img = Image.new('RGB', (512, 512), (44, 62, 80))
            img.save('assets/icon.png')
            img = Image.new('RGB', (512, 512), (52, 73, 94))
            img.save('assets/presplash.png')
            print('已生成佔位圖標')
        except:
            print('圖標生成失敗，但繼續')
        "

    - name: 配置 buildozer.spec
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
        fi
        
        sed -i 's/^#\?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/^#\?log_level =.*/log_level = 2/' buildozer.spec
        sed -i 's/^#\?android.api =.*/android.api = 30/' buildozer.spec
        sed -i 's/^#\?android.minapi =.*/android.minapi = 21/' buildozer.spec
        
        if ! grep -q "android.permissions" buildozer.spec; then
          echo "android.permissions = INTERNET, BLUETOOTH, BLUETOOTH_ADMIN, ACCESS_NETWORK_STATE, RECORD_AUDIO" >> buildozer.spec
        fi
        
        echo "========== buildozer.spec 配置完成 =========="

    - name: 構建 APK
      run: |
        rm -f .buildozer/.lock || true
        buildozer android debug 2>&1 | tee build.log
        echo "構建命令執行完畢，退出碼: $?"

    - name: 上傳構建日誌
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 構建日誌
        path: build.log
        retention-days: 7

    - name: 查找 APK 文件
      id: find_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "找到 APK: $APK_PATH"
          ls -lh $APK_PATH
        else
          echo "未找到 APK 文件"
          exit 1
        fi

    - name: 上傳 APK
      uses: actions/upload-artifact@v4
      with:
        name: 优必选机器人控制软件
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

    - name: 創建 Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "自動構建 v1.0.${{ github.run_number }}"
        body: "由 GitHub Actions 自動構建的 APK 文件。"
        files: ${{ steps.find_apk.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
