name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # 验证配置文件
    - name: 验证 buildozer.spec
      run: |
        echo "=== buildozer.spec 中的 requirements ==="
        grep "^requirements" buildozer.spec || echo "未找到 requirements 行"
        echo "========================================="
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libffi-dev \
          libssl-dev \
          python3-dev
    
    - name: 安装 Buildozer 和 Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    # 手动安装 Android SDK - 使用 Buildozer 期望的路径结构
    - name: 安装 Android SDK Build Tools
      run: |
        # 创建 Buildozer 期望的目录结构
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        
        cd /home/runner/.buildozer/android/platform
        
        # 下载 Android command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # 关键：创建 Buildozer 期望的 tools 目录结构
        # Buildozer 期望: android-sdk/tools/bin/sdkmanager
        mkdir -p android-sdk/tools
        cp -r cmdline-tools/* android-sdk/tools/
        
        # 设置环境变量
        export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_HOME/tools/bin:$PATH
        
        # 接受许可证
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        
        # 安装必要的组件
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        echo "SDK 安装完成"
        echo "检查 sdkmanager 位置:"
        ls -la $ANDROID_HOME/tools/bin/sdkmanager || echo "sdkmanager 未找到"
        echo "检查 build-tools:"
        ls -la $ANDROID_HOME/build-tools/ || echo "build-tools 未找到"
    
    # 设置环境变量供后续步骤使用
    - name: 设置 Android 环境变量
      run: |
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROIDSDK=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "PATH=$PATH:/home/runner/.buildozer/android/platform/android-sdk/tools/bin" >> $GITHUB_ENV
    
    # 清理缓存
    - name: 清理构建缓存
      run: |
        rm -rf .buildozer/.lock
        rm -rf bin
    
    # 确保有 main.py
    - name: 检查入口文件
      run: |
        if [ ! -f "main.py" ]; then
          if [ -f "android_main.py" ]; then
            cp android_main.py main.py
            echo "已复制 android_main.py 到 main.py"
          else
            echo "错误: 找不到 main.py"
            exit 1
          fi
        fi
        echo "入口文件存在: main.py"
    
    # 构建 APK
    - name: 构建 APK
      run: |
        buildozer -v android debug 2>&1 | tee build_log.txt
    
    # 上传 APK
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ubtech-robot-apk
        path: bin/*.apk
    
    # 上传日志（如果失败）
    - name: 上传构建日志
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: buildozer-log
        path: build_log.txt
