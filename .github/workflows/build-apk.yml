name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # 验证配置文件内容
    - name: 验证 buildozer.spec
      run: |
        echo "=== buildozer.spec 完整内容 ==="
        cat buildozer.spec
        echo "==============================="
        echo ""
        echo "=== requirements 行 ==="
        grep "^requirements" buildozer.spec || echo "未找到 requirements 行"
        echo "========================"
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libffi-dev \
          libssl-dev \
          python3-dev
    
    - name: 安装 Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    # 清理所有缓存，强制重新读取配置
    - name: 清理构建缓存
      run: |
        rm -rf .buildozer
        rm -rf bin
        rm -f .buildozer.spec.lock
    
    # 手动创建必要的目录
    - name: 创建目录结构
      run: |
        mkdir -p .buildozer
        mkdir -p bin
    
    # 确保有 main.py 入口文件
    - name: 检查入口文件
      run: |
        if [ ! -f "main.py" ]; then
          if [ -f "android_main.py" ]; then
            echo "复制 android_main.py 到 main.py"
            cp android_main.py main.py
          else
            echo "错误: 找不到 main.py 或 android_main.py"
            exit 1
          fi
        fi
        echo "入口文件: main.py"
        ls -la main.py
    
    # 直接使用 buildozer 构建
    - name: 构建 APK
      run: |
        buildozer -v android debug 2>&1 | tee build_log.txt
    
    # 显示构建日志的最后部分
    - name: 显示构建结果
      if: always()
      run: |
        echo "=== 构建日志最后 100 行 ==="
        tail -100 build_log.txt
        echo "==========================="
    
    # 查找 APK
    - name: 查找并上传 APK
      if: success()
      run: |
        echo "=== 查找 APK 文件 ==="
        find . -name "*.apk" -type f
        if [ -d "bin" ]; then
          ls -la bin/
        fi
      continue-on-error: true
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ubtech-robot-apk
        path: |
          bin/*.apk
          *.apk
      continue-on-error: true
    
    # 如果失败，上传构建日志
    - name: 上传构建日志
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: buildozer-log
        path: build_log.txt
