name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
    - name: 獲取源代碼
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安裝 Pillow
      run: |
        pip install pillow

    - name: 創建應用圖標
      run: |
        mkdir -p assets
        python3 -c "
from PIL import Image
img = Image.new('RGB', (512, 512), (44, 62, 80))
img.save('assets/icon.png')
img = Image.new('RGB', (512, 512), (52, 73, 94))
img.save('assets/presplash.png')
print('圖標已創建')
"

    - name: 創建 buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]

title = UBTechRobot
package.name = ubtechrobot
package.domain = org.ubtech

source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0.0
requirements = python3,kivy

orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.2.1
fullscreen = 0

android.accept_sdk_license = True
android.ndk = 25b
android.api = 30
android.minapi = 21
android.permissions = INTERNET, BLUETOOTH, BLUETOOTH_ADMIN, ACCESS_NETWORK_STATE, RECORD_AUDIO

log_level = 2
warn_on_root = 0

[buildozer]

log_level = 2
warn_on_root = 1
EOF
        
        if [ -f "android_main.py" ]; then
          echo "android.entrypoint = android_main.py" >> buildozer.spec
        fi
        
        echo "========== buildozer.spec 已創建 =========="
        cat buildozer.spec

    - name: 顯示項目結構
      run: |
        echo "=== 項目根目錄 ==="
        ls -la
        echo ""
        echo "=== 入口文件 ==="
        ls -la *.py 2>/dev/null || echo "無 Python 文件"

    - name: 構建 APK
      run: |
        echo "開始構建 APK..."
        buildozer android debug 2>&1 | tee build.log

    - name: 上傳構建日誌
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: 查找並上傳 APK
      id: upload_apk
      run: |
        APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null)
        
        if [ -n "$APK_FILES" ]; then
          echo "✅ 找到 APK:"
          echo "$APK_FILES"
          mkdir -p bin
          cp $APK_FILES bin/
          echo "apk_found=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 未找到 APK"
          echo "apk_found=false" >> $GITHUB_OUTPUT
        fi

    - name: 上傳 APK
      if: steps.upload_apk.outputs.apk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ubtech-robot-control
        path: bin/*.apk
        retention-days: 30
