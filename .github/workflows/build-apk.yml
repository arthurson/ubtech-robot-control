name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          autoconf \
          libtool \
          pkg-config \
          automake \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libopenjp2-7 \
          libtiff5

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 cython==0.29.36 pillow

    - name: Create assets directory and files
      run: |
        mkdir -p assets

        if [ ! -f "assets/icon.png" ]; then
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          try:
              img = Image.new('RGB', (512, 512), '#2C3E50')
              d = ImageDraw.Draw(img)
              d.ellipse([(50, 50), (462, 462)], fill='#3498DB')
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 150)
              except:
                  font = ImageFont.load_default()
              text = "UB"
              bbox = d.textbbox((0, 0), text, font=font)
              text_width = bbox[2] - bbox[0]
              text_height = bbox[3] - bbox[1]
              position = ((512 - text_width) // 2, (512 - text_height) // 2)
              d.text(position, text, fill='white', font=font)
              img.save('assets/icon.png')
              print("Created icon.png")
          except Exception as e:
              print(f"Error creating icon: {e}")
              img = Image.new('RGB', (512, 512), '#3498DB')
              img.save('assets/icon.png')
          PYEOF
        fi

        if [ ! -f "assets/presplash.png" ]; then
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          try:
              img = Image.new('RGB', (512, 512), '#2C3E50')
              d = ImageDraw.Draw(img)
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 80)
              except:
                  font = ImageFont.load_default()
              text = "优必选机器人控制"
              bbox = d.textbbox((0, 0), text, font=font)
              text_width = bbox[2] - bbox[0]
              text_height = bbox[3] - bbox[1]
              position = ((512 - text_width) // 2, (512 - text_height) // 2)
              d.text(position, text, fill='white', font=font)
              img.save('assets/presplash.png')
              print("Created presplash.png")
          except Exception as e:
              print(f"Error creating presplash: {e}")
              img = Image.new('RGB', (512, 512), '#34495E')
              img.save('assets/presplash.png')
          PYEOF
        fi

        echo "Assets created successfully"
        ls -la assets/

    - name: Download SDK and NDK
      run: |
        echo "Checking for cached dependencies..."
        mkdir -p ~/.buildozer
        if [ ! -d "~/.buildozer/android/platform/android-sdk" ]; then
          echo "SDK will be downloaded by buildozer"
        fi

    - name: Initialize buildozer
      run: |
        buildozer init
        buildozer android clean

    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee build.log

    - name: Check APK exists
      run: |
        if [ -f "bin/*.apk" ]; then
          echo "APK build successful!"
          ls -lh bin/
        else
          echo "APK build failed!"
          tail -n 100 build.log
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ubtech-robot-control-debug-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/logs/
        retention-days: 7
