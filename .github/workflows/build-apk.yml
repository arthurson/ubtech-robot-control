name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
    - name: 獲取源代碼
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安裝 Pillow
      run: |
        pip install pillow

    - name: 創建應用圖標
      run: |
        mkdir -p assets
        python3 -c "
        from PIL import Image
        img = Image.new('RGB', (512, 512), (44, 62, 80))
        img.save('assets/icon.png')
        img = Image.new('RGB', (512, 512), (52, 73, 94))
        img.save('assets/presplash.png')
        print('圖標已創建')
        "

    - name: 清理並配置 buildozer.spec
      run: |
        # 備份原始 spec（如果存在）
        if [ -f "buildozer.spec" ]; then
          cp buildozer.spec buildozer.spec.bak
        fi
        
        # 創建全新的 spec 文件，避免重複配置
        cat > buildozer.spec << 'EOF'
[app]

title = UBTechRobot
package.name = ubtechrobot
package.domain = org.ubtech

source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0.0
requirements = python3,kivy

orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.2.1
fullscreen = 0

android.accept_sdk_license = True
android.ndk = 25b
android.api = 30
android.minapi = 21
android.permissions = INTERNET, BLUETOOTH, BLUETOOTH_ADMIN, ACCESS_NETWORK_STATE, RECORD_AUDIO

log_level = 2
warn_on_root = 0

[buildozer]

log_level = 2
warn_on_root = 1
EOF
        
        # 如果存在 android_main.py 則設置入口點
        if [ -f "android_main.py" ]; then
          echo "android.entrypoint = android_main.py" >> buildozer.spec
        fi
        
        echo ""
        echo "========== buildozer.spec 配置完成 =========="
        cat buildozer.spec

    - name: 顯示項目文件結構
      run: |
        echo "=== 項目根目錄 ==="
        ls -la
        echo ""
        echo "=== assets 目錄 ==="
        ls -la assets/ || echo "無"
        echo ""
        echo "=== 入口文件 ==="
        if [ -f "android_main.py" ]; then
          echo "✅ android_main.py 存在"
        elif [ -f "main.py" ]; then
          echo "⚠️ 使用 main.py"
        else
          echo "❌ 找不到入口文件"
        fi

    - name: 構建 APK
      run: |
        echo "開始構建 APK..."
        buildozer android debug 2>&1 | tee build.log
        echo "構建完成，退出碼: $?"

    - name: 上傳構建日誌
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: 查找並上傳 APK
      id: upload_apk
      run: |
        echo "=== 查找 APK ==="
        APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null)
        
        if [ -n "$APK_FILES" ]; then
          echo "✅ 找到 APK:"
          echo "$APK_FILES"
          for apk in $APK_FILES; do
            ls -lh "$apk"
          done
          mkdir -p bin
          for apk in $APK_FILES; do
            cp "$apk" bin/
          done
          echo "apk_found=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 未找到 APK"
          echo ""
          echo "=== bin 目錄 ==="
          ls -la bin/ 2>/dev/null || echo "無"
          echo ""
          echo "=== .buildozer 目錄中的 APK ==="
          find .buildozer -name "*.apk" 2>/dev/null || echo "無"
          echo "apk_found=false" >> $GITHUB_OUTPUT
        fi

    - name: 上傳 APK
      if: steps.upload_apk.outputs.apk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ubtech-robot-control
        path: bin/*.apk
        retention-days: 30

    - name: 創建 GitHub Release
      if: steps.upload_apk.outputs.apk_found == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "UBTech Robot Control v1.0.${{ github.run_number }}"
        body: "自動構建版本 - 提交: ${{ github.sha }}"
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 構建失敗通知
      if: steps.upload_apk.outputs.apk_found != 'true'
      run: |
        echo "❌ 構建失敗，請下載 build-log 查看詳細錯誤"
        echo ""
        echo "=== 最後 50 行日誌 ==="
        tail -50 build.log 2>/dev/null || echo "無日誌"
